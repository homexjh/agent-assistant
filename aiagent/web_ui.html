<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIAgent 可视化</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a; --border: #2e3250;
    --accent: #6c8eff; --accent2: #a78bfa; --green: #34d399;
    --yellow: #fbbf24; --red: #f87171; --text: #e2e8f0;
    --text2: #94a3b8; --text3: #64748b; --r: 12px; --rs: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); height: 100vh;
    display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; background: var(--bg2);
    border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: all .3s; }
  .dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.run { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: pulse 1s infinite; }
  #st { font-size: 13px; color: var(--text2); }
  .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .btn-sm { padding: 5px 13px; background: transparent; border: 1px solid var(--border);
    border-radius: 20px; color: var(--text2); font-size: 12px; cursor: pointer;
    transition: all .2s; white-space: nowrap; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-new { border-color: rgba(108,142,255,.4); color: var(--accent); }
  .btn-new:hover { background: rgba(108,142,255,.1); }
  .btn-stop { border-color: rgba(248,113,113,.4); color: var(--red); display:none; }
  .btn-stop:hover { background: rgba(248,113,113,.1); }
  .btn-stop.show { display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  
  /* API 设置面板样式 */
  .settings-btn { position: relative; }
  .settings-panel {
    position: absolute; top: 45px; right: 20px; width: 380px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px; z-index: 1000;
    box-shadow: 0 10px 40px rgba(0,0,0,.4); display: none;
  }
  .settings-panel.show { display: block; }
  .settings-panel h3 { margin-bottom: 12px; font-size: 14px; color: var(--text); }
  .settings-group { margin-bottom: 14px; }
  .settings-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .settings-group input {
    width: 100%; padding: 8px 10px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--rs);
    color: var(--text); font-size: 12px; font-family: monospace;
  }
  .settings-group input:focus { outline: none; border-color: var(--accent); }
  .settings-save {
    width: 100%; padding: 8px; background: var(--accent);
    border: none; border-radius: var(--rs); color: #fff;
    font-size: 12px; cursor: pointer; margin-top: 8px;
  }
  .settings-save:hover { background: #5a7de8; }
  .settings-note {
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text3); line-height: 1.5;
  }
  .settings-loading { color: var(--text3); font-size: 13px; text-align: center; padding: 20px; }
  .settings-provider { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .settings-provider:last-child { border-bottom: none; margin-bottom: 0; }
  .settings-provider h4 { margin-bottom: 10px; font-size: 13px; color: var(--accent); }

  /* 任务列表面板 */
  .todo-panel {
    position: absolute; top: 45px; right: 20px; width: 320px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); z-index: 1001;
    box-shadow: 0 10px 40px rgba(0,0,0,.4);
  }
  .todo-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--text);
  }
  .todo-close { cursor: pointer; color: var(--text3); padding: 2px 6px; border-radius: 4px; }
  .todo-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .todo-list { max-height: 300px; overflow-y: auto; padding: 8px; }
  .todo-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; margin-bottom: 4px;
    background: rgba(255,255,255,0.03); border-radius: var(--rs);
    font-size: 12px; color: var(--text);
  }
  .todo-item:last-child { margin-bottom: 0; }
  .todo-icon { font-size: 14px; }
  .todo-icon.done { color: #22c55e; }
  .todo-icon.in_progress { color: #3b82f6; animation: pulse 1.5s infinite; }
  .todo-icon.pending { color: var(--text3); }
  .todo-icon.error { color: #ef4444; }
  .todo-title { flex: 1; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .todo-toggle {
    position: fixed; top: 12px; right: 380px;
    padding: 4px 10px; background: rgba(59,130,246,0.2);
    border: 1px solid rgba(59,130,246,0.4); border-radius: var(--rs);
    font-size: 11px; color: #60a5fa; cursor: pointer; z-index: 999;
    display: none;
  }
  .todo-toggle.show { display: block; }
  .todo-toggle:hover { background: rgba(59,130,246,0.3); }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar { width: 220px; flex-shrink: 0; display: flex; flex-direction: column;
    border-right: 1px solid var(--border); background: var(--bg2); }
  .stitle { padding: 12px 14px 8px; font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: .8px; border-bottom: 1px solid var(--border); }
  #hlist { flex: 1; overflow-y: auto; padding: 6px; }
  .hi { padding: 9px 11px; border-radius: var(--rs); margin-bottom: 3px;
    cursor: pointer; border: 1px solid transparent; transition: background .15s; position: relative; }
  .hi:hover { background: var(--bg3); }
  .hi.active { background: var(--bg3); border-color: var(--border); }
  .hi .q { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding-right: 18px; }
  .hi .m { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .hi .del { position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 14px; display: none; line-height: 1;
    padding: 2px 4px; border-radius: 4px; }
  .hi:hover .del { display: block; }
  .hi .del:hover { color: var(--red); background: rgba(248,113,113,.1); }

  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #feed { flex: 1; overflow-y: auto; padding: 20px 24px; scroll-behavior: smooth; }

  .empty { display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 14px; color: var(--text3); }
  .empty .ico { font-size: 44px; }
  .empty .hint { font-size: 14px; }
  .exs { display: flex; flex-direction: column; gap: 7px; margin-top: 6px; width: 100%; max-width: 440px; }
  .ex { padding: 9px 14px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--rs); font-size: 13px; color: var(--text2); cursor: pointer;
    transition: all .2s; text-align: left; }
  .ex:hover { border-color: var(--accent); color: var(--text); }

  .ev { margin-bottom: 10px; animation: fi .2s ease; }
  @keyframes fi { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  .ev-user { display: flex; justify-content: flex-end; margin-bottom: 12px; }
  .ev-user .bbl { max-width: 72%; padding: 11px 15px;
    background: linear-gradient(135deg,#3b4fd8,#6c8eff);
    border-radius: 16px 16px 4px 16px; font-size: 14px; line-height: 1.6; word-break: break-all; }

  .ev-thinking { display: flex; align-items: center; gap: 10px; padding: 9px 13px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
    color: var(--text2); font-size: 13px; }
  .rb { font-size: 11px; padding: 2px 8px; background: var(--bg3); border-radius: 10px; color: var(--text3); }
  .dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); margin: 0 2px; animation: db 1.2s infinite; }
  .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
  @keyframes db { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

  .ev-rsn { padding: 11px 15px; background: rgba(167,139,250,.06);
    border: 1px solid rgba(167,139,250,.2); border-radius: var(--r); }
  .ev-rsn .hd { display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    font-size: 11px; color: var(--accent2); font-weight: 600; text-transform: uppercase;
    letter-spacing: .5px; cursor: pointer; user-select: none; }
  .ev-rsn .body { font-size: 12px; color: var(--text2); line-height: 1.7;
    white-space: pre-wrap; word-break: break-word; max-height: 160px; overflow-y: auto; }
  .ev-rsn .body.col { max-height: 50px; overflow: hidden; }

  .ev-tc { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
  .ev-tc .hd { display: flex; align-items: center; gap: 8px; padding: 8px 13px;
    background: var(--bg2); font-size: 12px; color: var(--text3); border-bottom: 1px solid var(--border); }
  .tci { padding: 10px 13px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .tci:last-child { border-bottom: none; }
  .tcn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px;
    font-weight: 600; color: var(--accent); margin-bottom: 5px; }
  .tca { font-family: 'JetBrains Mono',monospace; font-size: 12px; color: var(--text2);
    background: var(--bg2); border-radius: var(--rs); padding: 6px 9px;
    white-space: pre-wrap; word-break: break-all; max-height: 100px; overflow-y: auto; }

  .ev-tr { margin-top: -6px; margin-left: 14px; border-left: 2px solid var(--border); padding: 6px 11px; }
  .trn { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .trc { font-family: 'JetBrains Mono',monospace; font-size: 12px; color: var(--green);
    background: rgba(52,211,153,.05); border: 1px solid rgba(52,211,153,.15);
    border-radius: var(--rs); padding: 6px 9px; white-space: pre-wrap; word-break: break-all;
    max-height: 130px; overflow-y: auto; }
  .trc.err { color: var(--red); background: rgba(248,113,113,.05); border-color: rgba(248,113,113,.2); }
  .tri { margin-top: 7px; border-radius: var(--rs); overflow: hidden; border: 1px solid var(--border); }
  .tri img { display: block; max-width: 100%; max-height: 260px; object-fit: contain;
    background: #000; cursor: zoom-in; }

  .ev-ann { padding: 9px 13px; background: rgba(251,191,36,.06);
    border: 1px solid rgba(251,191,36,.2); border-radius: var(--r); font-size: 13px; color: var(--yellow); }
  .ev-ann .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .5px; margin-bottom: 3px; opacity: .7; }

  .ev-wait { padding: 9px 13px; background: rgba(108,142,255,.06);
    border: 1px solid rgba(108,142,255,.2); border-radius: var(--r); font-size: 13px; color: var(--accent); }
  .ev-wait .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .5px; }

  .ev-done { padding: 15px 18px; background: var(--bg2);
    border: 1px solid rgba(108,142,255,.3); border-radius: var(--r); }
  .ev-done .lbl { font-size: 11px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .ev-done .body { font-size: 14px; line-height: 1.8; white-space: pre-wrap; word-break: break-word; }

  .ev-stopped { padding: 10px 14px; background: rgba(251,191,36,.06);
    border: 1px solid rgba(251,191,36,.25); border-radius: var(--r);
    font-size: 13px; color: var(--yellow); }

  .ev-err { padding: 11px 15px; background: rgba(248,113,113,.08);
    border: 1px solid rgba(248,113,113,.3); border-radius: var(--r);
    font-size: 13px; color: var(--red); }

  /* 输入区 */
  .inp-area { padding: 10px 20px 12px; border-top: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0; }

  .model-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  .model-label { font-size: 10px; color: var(--text3); padding: 0 4px;
    text-transform: uppercase; letter-spacing: .5px; }
  .model-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
  .mc { padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text3); font-size: 12px; cursor: pointer;
    transition: all .15s; white-space: nowrap; }
  .mc:hover { border-color: var(--accent); color: var(--text2); }
  .mc.sel { border-color: var(--accent); background: rgba(108,142,255,.15);
    color: var(--accent); font-weight: 600; }

  .inp-wrap { display: flex; gap: 10px; align-items: flex-end; background: var(--bg3);
    border: 1px solid var(--border); border-radius: var(--r);
    padding: 9px 12px; transition: border-color .2s; }
  .inp-wrap:focus-within { border-color: var(--accent); }
  #qi { flex: 1; background: none; border: none; outline: none; color: var(--text);
    font-size: 14px; line-height: 1.6; resize: none; min-height: 24px;
    max-height: 120px; font-family: inherit; }
  #qi::placeholder { color: var(--text3); }
  #sb { flex-shrink: 0; width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg,#3b4fd8,#6c8eff); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: opacity .2s,transform .1s; }
  #sb:hover { opacity: .9; transform: scale(1.05); }
  #sb:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  #sb svg { width: 17px; height: 17px; fill: white; }

  ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85);
    z-index:999; align-items:center; justify-content:center; cursor:zoom-out; }
  #overlay.show { display:flex; }
  #overlay img { max-width:90vw; max-height:90vh; border-radius:8px; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ AIAgent</div>
  <div class="dot" id="dot"></div>
  <span id="st">就绪</span>
  <div class="hdr-right">
    <button class="btn-sm btn-stop" id="stopBtn" onclick="stopRun()">■ 停止</button>
    <button class="btn-sm btn-new" onclick="newChat(event)">＋ 新对话</button>
    <button class="btn-sm" onclick="showCronPanel()">⏰ 定时任务</button>
    <button class="btn-sm" onclick="clearAllHistory()">清空记录</button>
    <button class="btn-sm" id="todoToggle" onclick="toggleTodoPanel()">📋 进度</button>
    <button class="btn-sm" onclick="toggleSettings()" title="API设置">⚙️ 设置</button>
  </div>
  
  <!-- API 设置面板 -->
  <div class="settings-panel" id="settingsPanel">
    <h3>🔑 API 配置</h3>
    <div id="settingsContent">
      <!-- 动态生成，根据服务器配置的提供商显示 -->
      <div class="settings-loading">加载中...</div>
    </div>
    <button class="settings-save" onclick="saveSettings()">💾 保存配置</button>
    <div class="settings-note">
      💡 服务器已配置的 API Key 会自动使用，无需手动输入。<br>
      如需覆盖服务器配置，可在上方输入自己的 Key。
    </div>
  </div>
  
  <!-- 任务列表面板 -->
  <div class="todo-panel" id="todoPanel" style="display:none;">
    <div class="todo-header">
      <span>📋 执行进度</span>
      <span class="todo-close" onclick="toggleTodoPanel()">✕</span>
    </div>
    <div class="todo-list" id="todoList"></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="stitle">历史对话</div>
    <div id="hlist"></div>
  </div>

  <div class="content">
    <div id="feed">
      <div class="empty" id="emp">
        <div class="ico">🤖</div>
        <div class="hint">选择模型，输入任务，观察 Agent 实时执行</div>
        <div class="exs">
          <div class="ex" onclick="fill(this)">用浏览器打开 B 站，搜索「强化学习」，截图</div>
          <div class="ex" onclick="fill(this)">查询北京今天的天气</div>
          <div class="ex" onclick="fill(this)">写一个冒泡排序的 Python 实现，运行并验证</div>
          <div class="ex" onclick="fill(this)">分别查询北京、上海、广州的天气</div>
        </div>
      </div>
    </div>

    <div class="inp-area">
      <div class="model-bar" id="mbar">
        <span class="model-label">Kimi</span>
        <div id="mg-kimi" style="display:flex;gap:5px"></div>
        <div class="model-sep"></div>
        <span class="model-label">Qwen</span>
        <div id="mg-qwen" style="display:flex;gap:5px"></div>
        <div class="model-sep" id="sep-azure" style="display:none"></div>
        <span class="model-label" id="label-azure" style="display:none">Azure</span>
        <div id="mg-azure" style="display:flex;gap:5px"></div>
      </div>
      
      <!-- 已选文件预览区 -->
      <div id="filePreview" style="display:none;flex-wrap:wrap;gap:8px;margin-bottom:8px;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;"></div>
      
      <div class="inp-wrap" id="dropZone" style="position:relative;">
        <textarea id="qi" placeholder="输入任务，Ctrl+Enter 发送，或粘贴/拖放图片..." rows="1"></textarea>
        <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.py,.js,.md,.json,.yaml,.yml,.csv" multiple style="display:none;">
        <button onclick="document.getElementById('fileInput').click()" title="添加文件" style="background:transparent;padding:8px;">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
        </button>
        <button id="sb" onclick="send()" title="发送">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
      <div style="font-size:11px;color:var(--text3);padding:4px 8px;">
        支持: 图片、PDF、代码文件 | 拖放或粘贴图片 | 多文件同时上传
      </div>
    </div>
  </div>
</div>

<div id="overlay" onclick="this.classList.remove('show')">
  <img id="oi" src="" alt="">
</div>

<script>
// ===== 模型配置 =====
let MODELS = {
  kimi: [
    { id: 'kimi-k2.5',            label: 'k2.5' },
    { id: 'kimi-k2-0711-preview', label: 'k2-preview' },
    { id: 'moonshot-v1-8k',       label: 'v1-8k' },
  ],
  qwen: [
    { id: 'qwen3-max-2026-01-23', label: 'qwen3-max' },
    { id: 'qwen3.5-plus',         label: 'qwen3.5-plus' },
    { id: 'qwen3-coder-next',     label: 'coder-next' },
    { id: 'qwen3-coder-plus',     label: 'coder-plus' },
  ],
};
// 提供商配置（从服务器 /config API 加载）
let PROVIDERS = {};
let AVAILABLE_PROVIDERS = [];

// 从服务器加载配置
async function loadServerConfig() {
  try {
    const res = await fetch('/config');
    const cfg = await res.json();
    
    // 保存可用提供商列表
    AVAILABLE_PROVIDERS = cfg.available_providers || [];
    
    // 保存服务器原始配置
    SERVER_PROVIDERS = JSON.parse(JSON.stringify(cfg.providers || {}));
    
    // 加载各提供商配置（优先使用 localStorage 的覆盖，但忽略空字符串）
    for (const [name, providerCfg] of Object.entries(cfg.providers || {})) {
      const localKey = localStorage.getItem(`${name}_api_key`);
      const localUrl = localStorage.getItem(`${name}_base_url`);
      const localEndpoint = localStorage.getItem(`${name}_endpoint`);
      const localDeployment = localStorage.getItem(`${name}_deployment`);
      
      // 使用 localStorage 值（如果不为空），否则使用服务器配置
      const baseUrl = (localUrl && localUrl.trim()) || (localEndpoint && localEndpoint.trim()) || providerCfg.base_url || providerCfg.endpoint || '';
      const apiKey = (localKey && localKey.trim()) || providerCfg.api_key || '';
      
      PROVIDERS[name] = {
        base_url: baseUrl,
        api_key: apiKey,
        models: providerCfg.models || [],
        type: providerCfg.type || 'openai',
        deployment: (localDeployment && localDeployment.trim()) || providerCfg.deployment || '',
        api_version: providerCfg.api_version || '',
      };
    }
    
    // 设置默认提供商和模型
    if (cfg.default_provider && AVAILABLE_PROVIDERS.includes(cfg.default_provider)) {
      selProvider = cfg.default_provider;
      selModel = cfg.default_model || PROVIDERS[selProvider].models[0];
    }
    
    // 保存到 localStorage
    localStorage.setItem('selProvider', selProvider);
    localStorage.setItem('selModel', selModel);
    
    // 更新模型列表和 UI
    updateModelList();
    buildModelBar();
    
  } catch (e) {
    console.error('加载服务器配置失败:', e);
    // 使用默认配置
    PROVIDERS = {
      kimi: { base_url: 'https://api.moonshot.cn/v1', api_key: '', models: ['kimi-k2.5'] },
    };
    AVAILABLE_PROVIDERS = ['kimi'];
  }
}

// ===== 文件上传状态 =====
let attachedFiles = []; // { id, file, base64, preview }

// ===== 文件处理函数 =====

// 生成唯一ID
function generateFileId() {
  return 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
}

// 格式化文件大小
function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// 检查文件类型
function getFileType(file) {
  if (file.type.startsWith('image/')) return 'image';
  if (file.type === 'application/pdf') return 'pdf';
  if (file.type.startsWith('text/') || 
      /\.(py|js|ts|jsx|tsx|java|cpp|c|h|go|rs|rb|php|swift|kt|scala|r|m|mm|cs|vb|fs|fsx|hs|lhs|erl|ex|exs|clj|cljs|edn|scm|rkt|d|nim|cr|n|zig|v|odin|julia|jl|groovy|gvy|lua|moon|moonscript|vim|nvim|ps1|psm1|psd1|bat|cmd|sh|bash|zsh|fish|awk|sed|perl|pl|pm|t|makefile|cmake|dockerfile|docker|nginx|conf|cfg|ini|properties|env|toml|yaml|yml|json|xml|html|htm|css|scss|sass|less|svg|md|markdown|rst|tex|bib|adoc|asciidoc|log|txt)$/i.test(file.name)) return 'code';
  return 'other';
}

// 添加文件到列表
async function addFile(file) {
  // 检查重复
  if (attachedFiles.some(f => f.file.name === file.name && f.file.size === file.size)) {
    return;
  }
  
  // 检查大小 (10MB限制)
  if (file.size > 10 * 1024 * 1024) {
    alert(`文件 ${file.name} 超过 10MB 限制`);
    return;
  }
  
  const fileId = generateFileId();
  const fileType = getFileType(file);
  
  const fileInfo = {
    id: fileId,
    file: file,
    type: fileType,
    base64: null,
    preview: null
  };
  
  // 读取文件
  try {
    if (fileType === 'image') {
      // 图片转 base64
      fileInfo.base64 = await readFileAsBase64(file);
      fileInfo.preview = URL.createObjectURL(file);
    } else if (fileType === 'pdf') {
      // PDF 转 base64（供后端保存）
      if (file.size < 10 * 1024 * 1024) { // 小于 10MB 的 PDF
        fileInfo.base64 = await readFileAsBase64(file);
      }
    } else if (fileType === 'code') {
      // 文本文件读取内容 + base64（供后端保存）
      if (file.size < 1024 * 1024) { // 小于1MB才读取文本
        fileInfo.text = await readFileAsText(file);
      }
      if (file.size < 10 * 1024 * 1024) { // 小于10MB保存文件
        fileInfo.base64 = await readFileAsBase64(file);
      }
    } else {
      // 其他文件：转 base64（供后端保存）
      if (file.size < 10 * 1024 * 1024) { // 小于 10MB
        fileInfo.base64 = await readFileAsBase64(file);
      }
    }
    
    attachedFiles.push(fileInfo);
    renderFilePreviews();
  } catch (err) {
    console.error('读取文件失败:', err);
    alert(`读取文件 ${file.name} 失败`);
  }
}

// 读取文件为 base64
function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]); // 去掉 data URL prefix
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// 读取文件为文本
function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

// 渲染文件预览
function renderFilePreviews() {
  const container = document.getElementById('filePreview');
  if (attachedFiles.length === 0) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  
  container.style.display = 'flex';
  container.innerHTML = attachedFiles.map(f => {
    if (f.type === 'image' && f.preview) {
      return `
        <div style="position:relative;display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:rgba(59,130,246,0.15);border-radius:6px;border:1px solid rgba(59,130,246,0.3);">
          <img src="${f.preview}" style="width:32px;height:32px;object-fit:cover;border-radius:4px;">
          <span style="font-size:12px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.file.name}</span>
          <span style="font-size:10px;color:var(--text3);">${formatFileSize(f.file.size)}</span>
          <span onclick="removeFile('${f.id}')" style="cursor:pointer;padding:2px;color:var(--text3);hover:color:#ef4444;">✕</span>
        </div>
      `;
    } else {
      const icon = f.type === 'pdf' ? '📄' : f.type === 'code' ? '📝' : '📎';
      return `
        <div style="position:relative;display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:rgba(255,255,255,0.1);border-radius:6px;border:1px solid rgba(255,255,255,0.2);">
          <span>${icon}</span>
          <span style="font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.file.name}</span>
          <span style="font-size:10px;color:var(--text3);">${formatFileSize(f.file.size)}</span>
          <span onclick="removeFile('${f.id}')" style="cursor:pointer;padding:2px;color:var(--text3);hover:color:#ef4444;">✕</span>
        </div>
      `;
    }
  }).join('');
}

// 移除文件
function removeFile(fileId) {
  const idx = attachedFiles.findIndex(f => f.id === fileId);
  if (idx > -1) {
    const f = attachedFiles[idx];
    if (f.preview) URL.revokeObjectURL(f.preview);
    attachedFiles.splice(idx, 1);
    renderFilePreviews();
  }
}

// 清空所有文件
function clearFiles() {
  attachedFiles.forEach(f => {
    if (f.preview) URL.revokeObjectURL(f.preview);
  });
  attachedFiles = [];
  renderFilePreviews();
}

// 初始化文件上传事件
function initFileUpload() {
  const fileInput = document.getElementById('fileInput');
  const textarea = document.getElementById('qi');
  const dropZone = document.getElementById('dropZone');
  
  // 文件选择
  fileInput.addEventListener('change', (e) => {
    Array.from(e.target.files).forEach(addFile);
    fileInput.value = ''; // 重置以便重复选择相同文件
  });
  
  // 粘贴事件
  textarea.addEventListener('paste', (e) => {
    const items = e.clipboardData.items;
    let hasImage = false;
    for (let item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        hasImage = true;
        const file = item.getAsFile();
        if (file) {
          file.name = 'pasted-image.png';
          addFile(file);
        }
      }
    }
  });
  
  // 拖放事件
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.style.border = '2px dashed var(--accent)';
  });
  
  dropZone.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dropZone.style.border = '';
  });
  
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.style.border = '';
    Array.from(e.dataTransfer.files).forEach(addFile);
  });
}

// sessions: [{id, title, updated_at, message_count, model}]
let sessions = [];      // 从服务端加载的会话列表
let sessionCache = {};  // 会话详细数据缓存 {id -> {messages, feedHtml}}
let curId = null;       // 当前对话 id
let history = [];       // 当前对话的 messages history

// 从服务端加载会话列表
async function loadSessionsFromServer() {
  try {
    const res = await fetch('/api/sessions');
    const data = await res.json();
    sessions = data.sessions || [];
    renderHistory();
  } catch (e) {
    console.error('Failed to load sessions:', e);
    sessions = [];
  }
}

// 从服务端加载单个会话详情
async function loadSessionDetail(id) {
  // 检查缓存
  if (sessionCache[id]) {
    return sessionCache[id];
  }
  
  try {
    const res = await fetch(`/api/sessions/${id}`);
    if (!res.ok) return null;
    const data = await res.json();
    
    // 缓存
    sessionCache[id] = {
      messages: data.messages || [],
      feedHtml: ''  // feedHtml 是 UI 状态，服务端不存储
    };
    return sessionCache[id];
  } catch (e) {
    console.error('Failed to load session detail:', e);
    return null;
  }
}

// 保存当前会话到服务端
async function saveCurrentSession() {
  if (!curId) return;
  
  const feed = document.getElementById('feed');
  const feedHtml = feed ? feed.innerHTML : '';
  
  // 更新缓存
  sessionCache[curId] = {
    messages: [...history],
    feedHtml: feedHtml
  };
  
  try {
    await fetch(`/api/sessions/${curId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: history,
        title: sessions.find(s => s.id === curId)?.title
      })
    });
    
    // 更新本地列表中的元数据
    const idx = sessions.findIndex(s => s.id === curId);
    if (idx >= 0) {
      sessions[idx].message_count = history.length;
      sessions[idx].updated_at = Date.now();
    }
  } catch (e) {
    console.error('Failed to save session:', e);
  }
}

function renderHistory() {
  if (sessions.length === 0) {
    document.getElementById('hlist').innerHTML = '<div style="padding:20px;color:var(--text2);text-align:center;font-size:12px">暂无历史对话</div>';
    return;
  }
  
  document.getElementById('hlist').innerHTML = sessions.map(s =>
    `<div class="hi${s.id===curId?' active':''}" onclick="loadSession('${s.id}')">
      <span class="del" onclick="event.stopPropagation();delSession('${s.id}')">×</span>
      <div class="q">${esc(s.title || '新对话')}</div>
      <div class="m">${new Date(s.updated_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}
        · <span style="color:var(--accent);opacity:.7">${(s.model || '').split('-').slice(-1)[0] || 'AI'}</span>
        · ${s.message_count || 0}条
      </div>
    </div>`
  ).join('');
}

function loadSession(id) {
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  
  // 先保存当前会话（异步，不阻塞）
  if (curId && curId !== id) {
    saveCurrentSession().catch(() => {});
  }
  
  curId = id;
  
  // 加载会话详情（异步）
  loadSessionDetail(id).then(detail => {
    if (detail) {
      history = detail.messages || [];
      const feed = document.getElementById('feed');
      // 如果有缓存的 feedHtml 则使用，否则显示空
      if (detail.feedHtml) {
        feed.innerHTML = detail.feedHtml;
      } else {
        feed.innerHTML = emptyHtml();
        // 重建 UI：从历史消息渲染
        rebuildFeedFromHistory(history);
      }
    } else {
      history = [];
      document.getElementById('feed').innerHTML = emptyHtml();
    }
    renderHistory();
  }).catch(() => {
    history = [];
    document.getElementById('feed').innerHTML = emptyHtml();
    renderHistory();
  });
}

// 从历史消息重建 UI（当 feedHtml 丢失时）
function rebuildFeedFromHistory(msgs) {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  
  for (let i = 0; i < msgs.length; i += 2) {
    const userMsg = msgs[i];
    const assistantMsg = msgs[i + 1];
    
    if (userMsg && userMsg.role === 'user') {
      // 添加用户消息
      const userDiv = document.createElement('div');
      userDiv.className = 'ev-user';
      userDiv.innerHTML = `<div class="bbl">${esc(userMsg.content || '')}</div>`;
      feed.appendChild(userDiv);
      
      // 添加助手消息（如果有）
      if (assistantMsg) {
        if (assistantMsg.role === 'assistant') {
          append('text', { text: assistantMsg.content || '' });
        } else if (assistantMsg.role === 'tool') {
          append('tool_result', { name: assistantMsg.name, content: assistantMsg.content });
        }
      }
    }
  }
  scrollToBottom();
}

function delSession(id) {
  fetch(`/api/sessions/${id}/delete`, { method: 'POST' })
    .then(() => {
      sessions = sessions.filter(s => s.id !== id);
      delete sessionCache[id];
      
      if (curId === id) {
        curId = null; 
        history = [];
        document.getElementById('feed').innerHTML = emptyHtml();
      }
      renderHistory();
    })
    .catch(e => console.error('Failed to delete session:', e));
}

function clearAllHistory() {
  if (!confirm('确定要清空所有历史对话吗？')) return;
  
  fetch('/api/sessions/clear_all')
    .then(() => {
      sessions = []; 
      sessionCache = {};
      curId = null; 
      history = [];
      document.getElementById('feed').innerHTML = emptyHtml();
      renderHistory();
    })
    .catch(e => console.error('Failed to clear sessions:', e));
}

function stopRun() {

}

function setRunning(v) {

  document.getElementById('sb').disabled = v;
  document.getElementById('stopBtn').classList.toggle('show', v);

// ===== 新建 / 发送 =====
function newChat(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  // 如果正在运行，先停止（不保存停止消息，直接新建）
  if (running) {
    if (es) { es.close(); es = null; }
    setRunning(false);
    // 发送停止请求（fire-and-forget）
    if (curRunId) {
      fetch(`/stop?rid=${curRunId}`).catch(() => {});
    }
    // 保存当前对话状态（如果已存在）
    if (curId && curQuery) {
      history.push({ role: 'user', content: curQuery });
      history.push({ role: 'assistant', content: '[已停止]' });
      saveCurrentSession().catch(() => {});
    }
  }

  curId = null; history = []; curQuery = '';
  document.getElementById('feed').innerHTML = emptyHtml();
  renderHistory();
  setDot('', '就绪');
}

async function send() {
  if (running) return;
  const ta = document.getElementById('qi');
  const q = ta.value.trim();
  
  // 允许只有文件没有文本的情况
  if (!q && attachedFiles.length === 0) return;
  
  ta.value = ''; ta.style.height = 'auto';
  curQuery = q || '[文件]';

  // 如果没有当前对话，新建 session；否则复用当前 session（多轮追加）
  let sid = curId;
  if (!sid) {
    // 创建新会话（调用服务端 API）
    try {
      const res = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: curQuery.slice(0, 30), model: selModel })
      });
      const data = await res.json();
      sid = data.id;
      curId = sid;
      sessions.unshift({ id: sid, title: curQuery.slice(0, 30), updated_at: Date.now(), message_count: 0, model: selModel });
      renderHistory();
    } catch (e) {
      console.error('Failed to create session:', e);
      // 降级：使用本地临时 ID
      sid = 'sess_' + Date.now();
      curId = sid;
    }
  }

  const emp = document.getElementById('emp');
  if (emp) emp.remove();
  
  // 显示用户消息（包含文件信息）
  let userContent = q;
  if (attachedFiles.length > 0) {
    const fileList = attachedFiles.map(f => `[${f.file.name}]`).join(' ');
    userContent = (q ? q + '\n\n' : '') + fileList;
  }
  append('user', { content: userContent });

  setRunning(true);
  curRunId = 'run_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);

  const prov = PROVIDERS[selProvider];
  
  console.log(`[send] Provider: ${selProvider}, Model: ${selModel}`);
  console.log(`[send] Files: ${attachedFiles.length}`);
  
  // 构建请求体
  const requestBody = {
    q: q,
    rid: curRunId,
    h: JSON.stringify(history),
    model: selModel,
    base_url: prov.base_url || '',
    api_key: prov.api_key || '',
    provider_type: prov.type || 'openai',
    deployment: prov.deployment || '',
    api_version: prov.api_version || '',
    files: [] // 文件列表
  };
  
  // 添加文件数据
  for (const f of attachedFiles) {
    requestBody.files.push({
      name: f.file.name,
      type: f.type,
      mime: f.file.type,
      size: f.file.size,
      data: f.base64 || null,
      text: f.text || null
    });
  }
  
  // 清空已选文件
  clearFiles();
  
  try {
    // 使用 Fetch API POST 发送
    const response = await fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });
    
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    
    // 处理流式响应
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    
    setDot('ok', '已连接');
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // 保留不完整的行
      
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            handle(data, q, sid);
          } catch (e) {
            console.error('解析消息失败:', e, line);
          }
        }
      }
    }
    
    // 处理剩余的数据
    if (buffer.startsWith('data: ')) {
      try {
        const data = JSON.parse(buffer.slice(6));
        handle(data, q, sid);
      } catch (e) {
        console.error('解析消息失败:', e);
      }
    }
    
  } catch (err) {
    console.error('请求失败:', err);
    append('err', { message: err.message });
    setDot('err', '连接失败');
  } finally {
    setRunning(false);
  }
}

function handle(data, query, sid) {
  switch (data.event) {
    case 'start':    setDot('ok', '已连接'); break;
    case 'thinking': append('thinking', data); break;
    case 'reasoning': append('reasoning', data); break;
    case 'tool_calls': append('tool_calls', data); break;
    case 'tool_result': append('tool_result', data); break;
    case 'subagent_announce': append('announce', data); break;
    case 'waiting_subagents': append('waiting', data); break;
    case 'stopped':
      append('stopped', {});
      es.close(); setRunning(false);
      break;
    case 'done':
      append('done', data);
      history.push({ role: 'user', content: query });
      history.push({ role: 'assistant', content: data.content });
      curQuery = '';
      // 异步保存到服务端（不阻塞）
      saveCurrentSession().then(() => {
        // 更新本地会话列表显示
        const s = sessions.find(x => x.id === sid);
        if (s) {
          s.message_count = history.length;
          s.updated_at = Date.now();
          renderHistory();
        }
      }).catch(() => {});
      es.close(); setRunning(false);
      break;
    case 'error':
      append('err', data);
      es.close(); setRunning(false);
      break;
    case 'todo':
      updateTodoList(data.todos || []);
      break;
    case 'end':
      es.close(); break;
  }
}

// ===== 渲染 =====
function append(type, data) {
  const feed = document.getElementById('feed');
  const el = document.createElement('div');
  el.className = 'ev';

  if (type === 'user') {
    el.className += ' ev-user';
    el.innerHTML = `<div class="bbl">${esc(data.content)}</div>`;
  } else if (type === 'thinking') {
    el.className += ' ev-thinking';
    el.id = `tk${data.round}`;
    el.innerHTML = `<span class="rb">Round ${data.round}</span>
      <span style="color:var(--accent2)">思考中</span>
      <div class="dots"><span></span><span></span><span></span></div>`;
  } else if (type === 'reasoning') {
    rmThink(data.round);
    el.className += ' ev-rsn';
    const long = data.content.length > 300;
    el.innerHTML = `<div class="hd" onclick="toggleR(this)">
        🧠 深度思考 <span style="color:var(--text3);font-weight:400">(${data.content.length} 字符)</span>
        <span style="margin-left:auto">${long?'▼ 展开':''}</span></div>
      <div class="body ${long?'col':''}">${esc(data.content)}</div>`;
  } else if (type === 'tool_calls') {
    rmThink(data.round);
    el.className += ' ev-tc';
    const rows = data.calls.map(tc => {
      const args = typeof tc.args==='string' ? tc.args : JSON.stringify(tc.args,null,2);
      return `<div class="tci"><div class="tcn">${icon(tc.name)} ${esc(tc.name)}</div>
        <div class="tca">${esc(args)}</div></div>`;
    }).join('');
    el.innerHTML = `<div class="hd">🔧 工具调用 · Round ${data.round} · ${data.calls.length} 个</div>${rows}`;
  } else if (type === 'tool_result') {
    el.className += ' ev-tr';
    const isErr = data.content.toLowerCase().startsWith('error');
    const imgHtml = data.image
      ? `<div class="tri"><img src="${data.image}" onclick="zoom(this.src)" alt=""/></div>` : '';
    el.innerHTML = `<div class="trn">↳ ${esc(data.name)} 返回</div>
      <div class="trc ${isErr?'err':''}">${esc(data.content)}</div>${imgHtml}`;
  } else if (type === 'announce') {
    el.className += ' ev-ann';
    el.innerHTML = `<div class="lbl">📬 子 Agent 完成通知</div><div>${esc(data.content)}</div>`;
  } else if (type === 'waiting') {
    el.className += ' ev-wait';
    el.innerHTML = `<div class="lbl">⏳ ${esc(data.message || '等待子Agent...')}</div>`;
  } else if (type === 'done') {
    el.className += ' ev-done';
    el.innerHTML = `<div class="lbl">✅ Agent 回复</div><div class="body">${mdLite(esc(data.content))}</div>`;
  } else if (type === 'stopped') {
    el.className += ' ev-stopped';
    el.innerHTML = `⏹ 已手动停止`;
  } else if (type === 'err') {
    el.className += ' ev-err';
    el.innerHTML = `❌ 错误：${esc(data.message)}`;
  }

  feed.appendChild(el);
  feed.scrollTop = feed.scrollHeight;

  // 实时保存 feedHtml（异步，不阻塞 UI）
  if (curId) {
    const currentFeedHtml = feed.innerHTML;
    sessionCache[curId] = {
      messages: [...history],
      feedHtml: currentFeedHtml
    };
    // 异步保存到服务端（不 await，避免阻塞）
    saveCurrentSession().catch(() => {});
  }
}

let cronLogs = []; // 执行日志缓存
let cronRunning = []; // 正在执行的 Agent 任务

function renderCronList(jobs) {
  const content = document.getElementById('cron-content');
  if (!jobs || jobs.length === 0) {
    content.innerHTML = '<div class="cron-empty">暂无定时任务</div>';
    return;
  }
  
  const rows = jobs.map(job => {
    const scheduleStr = typeof job.schedule === 'object' ? 
      (job.schedule.kind === 'every' ? `每${Math.round(job.schedule.every_ms/60000)}分钟` :
       job.schedule.kind === 'at' ? `一次性:${job.schedule.at}` :
       job.schedule.kind === 'cron' ? `Cron:${job.schedule.expr}` : '未知') 
      : String(job.schedule);
    const lastRun = job.last_run ? new Date(job.last_run).toLocaleString('zh-CN') : '从未';
    const isRunning = cronRunning.includes(job.id);
    const runningBadge = isRunning ? '<span class="cron-running">🤖 执行中...</span>' : '';
    return `
    <div class="cron-job ${job.enabled !== false ? 'active' : 'disabled'}">
      <div class="cron-job-info">
        <strong>${esc(job.name || '未命名')} ${runningBadge}</strong>
        <span class="cron-job-schedule">${esc(scheduleStr)}</span>
        <span class="cron-job-runs">运行 ${job.run_count || 0} 次 | 上次: ${esc(lastRun)} | ID: ${esc(String(job.id).slice(0,8))}</span>
      </div>
      <div class="cron-job-actions">
        <button onclick="triggerCronJob('${job.id}')" ${isRunning ? 'disabled' : ''}>${isRunning ? '执行中...' : '立即执行'}</button>
        <button onclick="deleteCronJob('${job.id}')">删除</button>
      </div>
    </div>
  `}).join('');
  
  // 添加日志区域
  const logsHtml = cronLogs.length > 0 ? `
    <div class="cron-logs">
      <h4>📋 最近执行日志</h4>
      ${cronLogs.slice(-10).map(log => `
        <div class="cron-log-item ${log.type}">
          <span class="cron-log-time">${esc(log.time)}</span>
          <span class="cron-log-job">${esc(log.jobName)}</span>
          <span class="cron-log-msg">${esc(log.message)}</span>
        </div>
      `).join('')}
    </div>
  ` : '';
  
  content.innerHTML = `<div class="cron-list">${rows}</div>${logsHtml}`;
}

async function submitCronJob() {
  const name = document.getElementById('cron-name').value.trim();
  const type = document.getElementById('cron-type').value;
  const payloadType = document.getElementById('cron-payload-type').value;
  const content = document.getElementById('cron-task-content').value.trim();
  
  if (!name || !content) {
    alert('请填写完整信息');
    return;
  }
  
  let schedule = {};
  if (type === 'every') {
    const mins = parseInt(document.getElementById('cron-every').value) || 60;
    schedule = { kind: 'every', every_ms: mins * 60000 };
  } else if (type === 'at') {
    const at = document.getElementById('cron-at').value;
    if (!at) { alert('请选择执行时间'); return; }
    schedule = { kind: 'at', at };
  } else {
    const expr = document.getElementById('cron-expr').value.trim();
    if (!expr) { alert('请填写 Cron 表达式'); return; }
    schedule = { kind: 'cron', expr };
  }
  
  const payload = { kind: payloadType };
  if (payloadType === 'exec') payload.command = content;
  else if (payloadType === 'agent') payload.prompt = content;
  else payload.text = content;
  
  try {
    const response = await fetch('/cron', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'add', name, schedule, payload })
    });
    const result = await response.json();
    if (result.status === 'ok') {
      alert('任务创建成功！');
      // 切换回列表标签并刷新
      setTimeout(() => {
        // 先切换到列表标签
        const tabs = document.querySelectorAll('.cron-tab');
        tabs.forEach(t => t.classList.remove('active'));
        if (tabs[0]) tabs[0].classList.add('active');
        // 然后加载列表
        loadCronList();
      }, 100);
    } else {
      alert('创建失败: ' + result.error);
    }
  } catch (e) {
    alert('请求失败: ' + e.message);
  }
}

async function triggerCronJob(jobId) {
  try {
    await fetch('/cron', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'run', job_id: jobId })
    });
    alert('已触发执行');
    loadCronList();
  } catch (e) {
    alert('触发失败: ' + e.message);
  }
}

async function deleteCronJob(jobId) {
  if (!confirm('确定要删除这个任务吗？')) return;
  try {
    await fetch('/cron', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'remove', job_id: jobId })
    });
    loadCronList();
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

  currentTodos = todos;
  const listEl = document.getElementById('todoList');
  const panelEl = document.getElementById('todoPanel');
  const toggleBtn = document.getElementById('todoToggle');
  
  if (!todos || todos.length === 0) {
    panelEl.style.display = 'none';
    toggleBtn.style.display = 'none';
    return;
  }
  
  // 显示切换按钮
  toggleBtn.style.display = 'inline-block';
  
  // 构建任务列表 HTML
  const iconMap = {
    'done': '✓',
    'in_progress': '⏳',
    'pending': '○',
    'error': '✗'
  };
  
  listEl.innerHTML = todos.map(todo => {
    const icon = iconMap[todo.status] || '○';
    return `
      <div class="todo-item">
        <span class="todo-icon ${todo.status}">${icon}</span>
        <span class="todo-title">${escapeHtml(todo.title)}</span>
      </div>
    `;
  }).join('');
  
  // 自动显示面板（如果有进行中的任务）
  const hasInProgress = todos.some(t => t.status === 'in_progress');
  if (hasInProgress && panelEl.style.display !== 'block') {
    panelEl.style.display = 'block';
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderSettingsPanel() {
  const content = document.getElementById('settingsContent');
  
  if (AVAILABLE_PROVIDERS.length === 0) {
    content.innerHTML = '<div class="settings-loading">等待服务器配置...</div>';
    return;
  }
  
  let html = '';
  
  for (const name of AVAILABLE_PROVIDERS) {
    const provider = PROVIDERS[name];
    const displayName = name === 'kimi' ? 'Kimi (Moonshot)' : 
                       name === 'qwen' ? '通义千问 (Qwen)' : 
                       name === 'azure' ? 'Azure OpenAI' : name;
    
    const isAzure = provider.type === 'azure';
    
    html += `
      <div class="settings-provider">
        <h4>${displayName}</h4>
        <div class="settings-group">
          <label>API Key ${provider.api_key ? '✅ (已配置)' : ''}</label>
          <input type="password" id="setting_${name}_key" 
            placeholder="${provider.api_key ? '已配置，留空使用服务器配置' : '输入 API Key'}"
            value="${localStorage.getItem(name + '_api_key') || ''}">
        </div>
        ${isAzure ? `
        <div class="settings-group">
          <label>Endpoint</label>
          <input type="text" id="setting_${name}_endpoint" 
            value="${localStorage.getItem(name + '_endpoint') || provider.base_url || ''}" 
            placeholder="https://xxx.openai.azure.com">
        </div>
        <div class="settings-group">
          <label>Deployment Name</label>
          <input type="text" id="setting_${name}_deployment" 
            value="${localStorage.getItem(name + '_deployment') || provider.deployment || ''}" 
            placeholder="gpt-4o">
        </div>
        ` : `
        <div class="settings-group">
          <label>Base URL (可选)</label>
          <input type="text" id="setting_${name}_url" 
            value="${localStorage.getItem(name + '_base_url') || ''}" 
            placeholder="${provider.base_url}">
        </div>
        `}
      </div>
    `;
  }
  
  content.innerHTML = html;
}

function saveSettings() {
  // 保存每个提供商的配置
  for (const name of AVAILABLE_PROVIDERS) {
    const provider = PROVIDERS[name];
    const isAzure = provider.type === 'azure';
    
    // 保存 API Key
    const keyInput = document.getElementById(`setting_${name}_key`);
    if (keyInput) {
      const key = keyInput.value.trim();
      if (key) {
        localStorage.setItem(`${name}_api_key`, key);
        PROVIDERS[name].api_key = key;
      } else {
        localStorage.removeItem(`${name}_api_key`);
        // 恢复服务器配置
        PROVIDERS[name].api_key = SERVER_PROVIDERS[name]?.api_key || '';
      }
    }
    
    if (isAzure) {
      // Azure 特殊配置
      const endpointInput = document.getElementById(`setting_${name}_endpoint`);
      if (endpointInput && endpointInput.value.trim()) {
        localStorage.setItem(`${name}_endpoint`, endpointInput.value.trim());
        PROVIDERS[name].base_url = endpointInput.value.trim();
      }
      
      const deploymentInput = document.getElementById(`setting_${name}_deployment`);
      if (deploymentInput && deploymentInput.value.trim()) {
        localStorage.setItem(`${name}_deployment`, deploymentInput.value.trim());
        PROVIDERS[name].deployment = deploymentInput.value.trim();
      }
    } else {
      // 标准配置
      const urlInput = document.getElementById(`setting_${name}_url`);
      if (urlInput && urlInput.value.trim()) {
        localStorage.setItem(`${name}_base_url`, urlInput.value.trim());
        PROVIDERS[name].base_url = urlInput.value.trim();
      }
    }
  }
  
  // 关闭面板
  document.getElementById('settingsPanel').classList.remove('show');
  
  // 提示
  alert('✅ API 配置已保存！');
}

// 点击面板外部关闭设置面板
document.addEventListener('click', (e) => {
  const panel = document.getElementById('settingsPanel');
  const btn = e.target.closest('.btn-sm[onclick="toggleSettings()"]');
  if (!panel.contains(e.target) && !btn && panel.classList.contains('show')) {
    panel.classList.remove('show');
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 {
            color: #e94560;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(233, 69, 96, 0.2);
            padding: 10px 25px;
            border-radius: 25px;
            color: #fff;
            font-size: 1.2em;
            border: 2px solid #e94560;
        }

        .score-item span {
            color: #e94560;
            font-weight: bold;
            font-size: 1.3em;
        }

        #gameCanvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            background: #0a0a0a;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }

        .controls {
            margin-top: 20px;
            color: #aaa;
            font-size: 0.9em;
        }

        .controls p {
            margin: 5px 0;
        }

        .btn {
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #e94560;
            display: none;
            z-index: 10;
        }

        .game-over h2 {
            color: #e94560;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        .mobile-controls {
            display: none;
            margin-top: 20px;
        }

        .mobile-controls .row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 5px 0;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            background: rgba(233, 69, 96, 0.3);
            border: 2px solid #e94560;
            border-radius: 10px;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mobile-btn:active {
            background: #e94560;
        }

        @media (max-width: 500px) {
            .mobile-controls {
                display: block;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .score-board {
                gap: 20px;
            }
            
            .score-item {
                padding: 8px 15px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="score-board">
            <div class="score-item">得分: <span id="score">0</span></div>
            <div class="score-item">最高分: <span id="highScore">0</span></div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="game-over" id="gameOver">
                <h2>游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button class="btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        
        <button class="btn" id="startBtn" onclick="startGame()">开始游戏</button>
        
        <div class="mobile-controls">
            <div class="row">
                <button class="mobile-btn" onclick="changeDirection('up')">↑</button>
            </div>
            <div class="row">
                <button class="mobile-btn" onclick="changeDirection('left')">←</button>
                <button class="mobile-btn" onclick="changeDirection('down')">↓</button>
                <button class="mobile-btn" onclick="changeDirection('right')">→</button>
            </div>
        </div>
        
        <div class="controls">
            <p>使用方向键 ↑ ↓ ← → 控制蛇的移动</p>
            <p>按空格键暂停/继续游戏</p>
        </div>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        // 游戏状态
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 100;
        let isGameRunning = false;
        let isPaused = false;
        
        // 初始化显示最高分
        document.getElementById('highScore').textContent = highScore;
        
        // 初始化游戏
        function initGame() {
            // 初始化蛇（从中间开始，长度为3）
            const startX = Math.floor(tileCount / 2);
            const startY = Math.floor(tileCount / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = 100;
            updateScore();
            generateFood();
            draw();
        }
        
        // 生成食物
        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (isSnakeAt(food.x, food.y));
        }
        
        // 检查蛇是否在指定位置
        function isSnakeAt(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }
        
        // 游戏主循环
        function gameStep() {
            if (isPaused) return;
            
            // 更新方向
            direction = nextDirection;
            
            // 计算新头部位置
            const head = { ...snake[0] };
            
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 碰撞检测 - 墙壁
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // 碰撞检测 - 自身
            if (isSnakeAt(head.x, head.y)) {
                gameOver();
                return;
            }
            
            // 移动蛇
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                generateFood();
                
                // 增加游戏速度
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                // 没吃到食物，移除尾部
                snake.pop();
            }
            
            draw();
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格（可选，增加视觉效果）
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 绘制食物（带发光效果）
            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                2,
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#ee5a6f');
            
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 食物发光效果
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                // 蛇身渐变颜色
                const greenValue = Math.max(100, 200 - index * 5);
                const segmentColor = index === 0 
                    ? '#00d9ff'  // 蛇头
                    : `rgb(0, ${greenValue}, 100)`;  // 蛇身
                
                // 绘制圆角矩形
                const x = segment.x * gridSize + 1;
                const y = segment.y * gridSize + 1;
                const size = gridSize - 2;
                const radius = 5;
                
                ctx.fillStyle = segmentColor;
                ctx.beginPath();
                ctx.roundRect(x, y, size, size, radius);
                ctx.fill();
                
                // 蛇头特殊处理
                if (index === 0) {
                    // 蛇头高光
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.beginPath();
                    ctx.arc(x + size/3, y + size/3, size/4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 蛇眼
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    let eyeOffsetX1, eyeOffsetY1, eyeOffsetX2, eyeOffsetY2;
                    
                    switch (direction) {
                        case 'up':
                            eyeOffsetX1 = size/3; eyeOffsetY1 = size/4;
                            eyeOffsetX2 = size*2/3; eyeOffsetY2 = size/4;
                            break;
                        case 'down':
                            eyeOffsetX1 = size/3; eyeOffsetY1 = size*3/4;
                            eyeOffsetX2 = size*2/3; eyeOffsetY2 = size*3/4;
                            break;
                        case 'left':
                            eyeOffsetX1 = size/4; eyeOffsetY1 = size/3;
                            eyeOffsetX2 = size/4; eyeOffsetY2 = size*2/3;
                            break;
                        case 'right':
                            eyeOffsetX1 = size*3/4; eyeOffsetY1 = size/3;
                            eyeOffsetX2 = size*3/4; eyeOffsetY2 = size*2/3;
                            break;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(x + eyeOffsetX1, y + eyeOffsetY1, eyeSize, 0, Math.PI * 2);
                    ctx.arc(x + eyeOffsetX2, y + eyeOffsetY2, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        
        // 更新分数显示
        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }
        
        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('startBtn').style.display = 'inline-block';
        }
        
        // 开始游戏
        function startGame() {
            if (isGameRunning) return;
            
            isGameRunning = true;
            isPaused = false;
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';
            
            initGame();
            gameLoop = setInterval(gameStep, gameSpeed);
        }
        
        // 重新开始游戏
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        // 改变方向
        function changeDirection(newDirection) {
            if (!isGameRunning || isPaused) return;
            
            // 防止反向移动
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[newDirection] !== direction) {
                nextDirection = newDirection;
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    isPaused = !isPaused;
                    break;
            }
        });
        
        // 初始绘制
        initGame();
    </script>
</body>
</html>
